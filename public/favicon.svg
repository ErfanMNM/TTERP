<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background: rounded square with gradient -->
  <rect width="32" height="32" rx="7" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Letter E — bold, modern, white -->
  <text x="16" y="23" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="white" text-anchor="middle">E</text>
  <!-- Bottom accent line -->
  <rect x="8" y="27" width="16" height="2" rx="1" fill="white" opacity="0.4"/>
</svg>
